{% load static %}

<!DOCTYPE html>
<html>

<head>
    <title>Journey</title>
    <link rel="stylesheet" href="{% static 'css/features.css' %}">
</head>

<body>

<div class="container">

    <h1 class="page-title">
        🚖 Start Journey
    </h1>

    <div class="card">

        <form method="POST">

            {% csrf_token %}

            <input
                type="text"
                name="source"
                placeholder="Enter Source"
                required>

            <input
                type="text"
                name="destination"
                placeholder="Enter Destination"
                required>

            <select name="transport">

                <option value="Car">Car</option>
                <option value="Bus">Bus</option>
                <option value="Train">Train</option>

            </select>

            <button class="btn" type="submit">
                Start Journey
            </button>

        </form>

        <br><br>

        <table>

            <tr>
                <th>Source</th>
                <th>Destination</th>
                <th>Transport</th>
                <th>Status</th>
            </tr>

            {% for j in journeys %}

            <tr>
                <td>{{ j.source }}</td>
                <td>{{ j.destination }}</td>
                <td>{{ j.transport_mode }}</td>
                <td>{{ j.status }}</td>
            </tr>

            {% empty %}

            <tr>
                <td colspan="4" style="text-align:center;">
                    No journeys yet.
                </td>
            </tr>

            {% endfor %}

        </table>

    </div>

</div>

<div class="nav-links" style="text-align:center; margin:20px 0;">
    <a href="/dashboard/" class="btn">
        ← Back to Dashboard
    </a>
</div>

{% if google_url %}
<script>
    window.open("{{ google_url }}", "_blank");
</script>
{% endif %}

</body>

</html>
